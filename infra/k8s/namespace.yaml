---
apiVersion: v1
kind: Namespace
metadata:
  name: gmsol
  labels:
    name: gmsol
    app.kubernetes.io/managed-by: terraform

---
# Network Policy: deny all ingress by default, allow only necessary egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: gmsol
spec:
  podSelector: {}
  policyTypes:
    - Ingress
